<svg id="site-favicon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img">
  <title>Abstract Nonsense favicon</title>
  <style>
    :root { 
      --primary: #2749c9; /* Light Accent (Deep Blue) */ 
    }
    @media (prefers-color-scheme: dark) { 
      :root { 
        --primary: #ffc400; /* Dark Accent (Golden Yellow) */ 
      } 
    }
    
    path { 
      stroke: var(--primary); 
      stroke-width: 4; 
      stroke-linecap: round; 
      stroke-linejoin: round; 
      fill: none; 
      transform: translateZ(0); 
    }
    .bracket { 
      stroke-width: 3; 
      stroke-linecap: square; 
    }
  </style>

  <!-- invisible hotspot to ensure mouse events fire across the whole icon -->
  <rect id="hotspot" width="100" height="100" fill="transparent" style="pointer-events:all" />

  <path class="bracket" d="M 22,15 L 12,15 L 12,85 L 22,85 M 78,15 L 88,15 L 88,85 L 78,85" />

  <g transform="translate(10, 10) scale(0.8)">
    
    <path d="M 30,80 L 30,80 M 50,20 L 50,20 L 50,20">
      <animate attributeName="d" dur="2s" begin="0s;hotspot.mouseover" repeatCount="1" fill="freeze" restart="always"
        values="
          M 30,80 L 30,80 M 50,20 L 50,20 L 50,20; 
          M 30,80 L 30,80 M 70,20 L 70,20 L 70,20; 
          M 22,80 L 38,80 M 63,27 L 70,20 L 77,27"
        keyTimes="0; 0.6; 1" 
        calcMode="spline" 
        keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    </path>

    <path d="M 50,20 L 50,20 L 70,80 M 70,80 L 50,20">
      <animate attributeName="d" dur="2s" begin="0s;hotspot.mouseover" repeatCount="1" fill="freeze" restart="always"
        values="
          M 50,20 L 50,20 L 70,80 M 70,80 L 50,20; 
          M 30,20 L 30,20 L 70,80 M 70,80 L 70,20; 
          M 30,20 L 42,20 L 70,62 M 70,80 L 70,20"
        keyTimes="0; 0.6; 1" 
        calcMode="spline" 
        keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    </path>

    <path d="M 30,80 L 50,20 L 70,80">
      <animate attributeName="d" dur="2s" begin="0s;hotspot.mouseover" repeatCount="1" fill="freeze" restart="always"
        values="
          M 30,80 L 50,20 L 70,80; 
          M 30,80 L 30,20 L 70,80; 
          M 30,80 L 30,20 L 70,80"
        keyTimes="0; 0.6; 1" 
        calcMode="spline" 
        keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    </path>
  </g>
</svg>
