<svg id="site-logo" class="site-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-hidden="true" focusable="false">
  <title>Abstract Nonsense favicon</title>
  <style>
    #site-logo {
      --site-logo-primary: #2749c9; /* Light Accent (Deep Blue) */
    }

    @media (prefers-color-scheme: dark) {
      #site-logo {
        --site-logo-primary: #ffc400; /* Dark Accent (Golden Yellow) */
      }
    }

    #site-logo path {
      stroke: var(--site-logo-primary);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      transform: translateZ(0);
    }

    #site-logo .bracket {
      stroke-width: 3;
      stroke-linecap: square;
    }
  </style>

  <path class="bracket" d="M 22,15 L 12,15 L 12,85 L 22,85 M 78,15 L 88,15 L 88,85 L 78,85" />

  <g transform="translate(10, 10) scale(0.8)">
    
    <path d="M 30,80 L 30,80 M 50,20 L 50,20 L 50,20">
      <animate attributeName="d" dur="2s" begin="0s" repeatCount="1" fill="freeze"
        values="
          M 30,80 L 30,80 M 50,20 L 50,20 L 50,20; 
          M 30,80 L 30,80 M 70,20 L 70,20 L 70,20; 
          M 22,80 L 38,80 M 63,27 L 70,20 L 77,27"
        keyTimes="0; 0.6; 1" 
        calcMode="spline" 
        keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    </path>

    <path d="M 50,20 L 50,20 L 70,80 M 70,80 L 50,20">
      <animate attributeName="d" dur="2s" begin="0s" repeatCount="1" fill="freeze"
        values="
          M 50,20 L 50,20 L 70,80 M 70,80 L 50,20; 
          M 30,20 L 30,20 L 70,80 M 70,80 L 70,20; 
          M 30,20 L 42,20 L 70,62 M 70,80 L 70,20"
        keyTimes="0; 0.6; 1" 
        calcMode="spline" 
        keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    </path>

    <path d="M 30,80 L 50,20 L 70,80">
      <animate attributeName="d" dur="2s" begin="0s" repeatCount="1" fill="freeze"
        values="
          M 30,80 L 50,20 L 70,80; 
          M 30,80 L 30,20 L 70,80; 
          M 30,80 L 30,20 L 70,80"
        keyTimes="0; 0.6; 1" 
        calcMode="spline" 
        keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    </path>
  </g>
</svg>
