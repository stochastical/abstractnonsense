name: Add Vocabulary Word

on:
  issues:
    types:
      - labeled

permissions:
  contents: write
  issues: write

jobs:
  add-word:
    if: >
        github.actor == 'stochastical' &&
        github.triggering_actor == 'stochastical' &&
        github.event.issue.user.login == 'stochastical' &&
        github.event.label.name == 'new-vocabulary-word'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Parse Issue
        id: issue-parser
        uses: issue-ops/parser@v5.0.0
        with:
          body: ${{ github.event.issue.body }}
          issue-form-template: 'new-vocabulary-word.yml'

      - name: Add word to vocabulary.yaml
        run: |
          echo '${{ steps.issue-parser.outputs.json }}' > parsed.json

          yq -o=yaml '
            [
              (
                load("parsed.json")
                | {
                    word: .word,
                    definition: .definition
                  }
                + (if .example != null and .example != "" then {example: .example} else {} end)
              )
            ] + .
          ' data/vocabulary.yaml > data/vocabulary.yaml.tmp

          mv data/vocabulary.yaml.tmp data/vocabulary.yaml

      - name: Commit and push
        run: |
          WORD=$(echo '${{ steps.issue-parser.outputs.json }}' | jq -r '.word')
          
          git config user.name "Yossi Frenkel"
          git config user.email "14257692+stochastical@users.noreply.github.com"
          
          git add data/vocabulary.yaml
          git commit -m "Add vocabulary word (via Actions): ${WORD}"
          git push origin main

          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "Added **${WORD}** to \`data/vocabulary.yaml\` at [commit](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/$(git rev-parse HEAD))"

          gh issue close ${{ github.event.issue.number }} --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
